version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: insurevn-postgres
    restart: always
    environment:
      POSTGRES_DB: insurevn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: insurevn-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant/storage:/qdrant/storage
