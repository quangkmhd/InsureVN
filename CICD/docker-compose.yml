version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: insurevn-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../database/qdrant/storage:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: insurevn-neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/insurevn-local"
    volumes:
      - ../database/neo4j/data:/data
      - ../database/neo4j/logs:/logs
