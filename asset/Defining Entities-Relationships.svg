<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" width="1300" height="760">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 15px; fill: #6b7280; }
    .section-title { font-size: 16px; font-weight: 700; fill: #374151; }
    .node-label { font-size: 16px; font-weight: 700; fill: #111827; }
    .node-detail { font-size: 13px; fill: #6b7280; }
    .node-sub { font-size: 12px; fill: #6b7280; font-family: "Courier New", Courier, monospace; }
    .chip { font-size: 12px; font-weight: 600; fill: #374151; }
    .legend-text { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1300" height="760" fill="#ffffff"/>
  <text x="650" y="44" text-anchor="middle" class="title">Knowledge Graph: Defining Entities &amp; Relationships</text>
  <text x="650" y="70" text-anchor="middle" class="subtitle">High-level flow from insurance documents to a governed graph artifact</text>

  <rect x="50" y="105" width="1200" height="125" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2" stroke-dasharray="6,5"/>
  <text x="75" y="136" class="section-title">Inputs</text>

  <g filter="url(#shadow)">
    <rect x="110" y="155" width="245" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="232" y="181" text-anchor="middle" class="node-label">Policy Documents</text>
    <text x="232" y="201" text-anchor="middle" class="node-detail">Markdown / TXT corpus</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="155" width="245" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="622" y="181" text-anchor="middle" class="node-label">AI Providers</text>
    <text x="622" y="201" text-anchor="middle" class="node-detail">schema proposal + merge</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="890" y="155" width="245" height="58" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="1012" y="181" text-anchor="middle" class="node-label">Qdrant Lineage</text>
    <text x="1012" y="201" text-anchor="middle" class="node-detail">optional chunk metadata</text>
  </g>

  <rect x="50" y="270" width="1200" height="240" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2" stroke-dasharray="6,5"/>
  <text x="75" y="302" class="section-title">Main Pipeline</text>

  <g filter="url(#shadow)">
    <rect x="90" y="350" width="245" height="95" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="212" y="378" text-anchor="middle" class="node-label">1. Discover Schema</text>
    <text x="212" y="402" text-anchor="middle" class="node-detail">Find candidate entity types</text>
    <text x="212" y="422" text-anchor="middle" class="node-detail">and relationship types</text>
    <text x="212" y="439" text-anchor="middle" class="node-sub">01_discover_schema.py</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="385" y="350" width="245" height="95" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="507" y="378" text-anchor="middle" class="node-label">2. Clean Schema</text>
    <text x="507" y="402" text-anchor="middle" class="node-detail">Merge duplicates</text>
    <text x="507" y="422" text-anchor="middle" class="node-detail">choose final allowed labels</text>
    <text x="507" y="439" text-anchor="middle" class="node-sub">02-03 scripts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="350" width="245" height="95" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="802" y="378" text-anchor="middle" class="node-label">3. Build Graph</text>
    <text x="802" y="402" text-anchor="middle" class="node-detail">Extract real entities</text>
    <text x="802" y="422" text-anchor="middle" class="node-detail">and relationships from docs</text>
    <text x="802" y="439" text-anchor="middle" class="node-sub">04_build_knowledge_graph.py</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="975" y="350" width="245" height="95" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="1097" y="378" text-anchor="middle" class="node-label">4. Validate &amp; Save</text>
    <text x="1097" y="402" text-anchor="middle" class="node-detail">Check quality and lineage</text>
    <text x="1097" y="422" text-anchor="middle" class="node-detail">persist graph artifacts</text>
  </g>

  <path d="M 335,398 L 385,398" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 630,398 L 680,398" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 925,398 L 975,398" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>

  <path d="M 232,213 L 232,350" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 622,213 L 507,350" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-green)"/>
  <path d="M 1012,213 L 1012,250 L 802,250 L 802,350" fill="none" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-gray)"/>

  <rect x="50" y="550" width="1200" height="125" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2" stroke-dasharray="6,5"/>
  <text x="75" y="582" class="section-title">Outputs</text>

  <g filter="url(#shadow)">
    <rect x="365" y="602" width="285" height="56" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
    <text x="507" y="626" text-anchor="middle" class="node-label">Schema Contract</text>
    <text x="507" y="646" text-anchor="middle" class="node-detail">allowed nodes, relationships, properties</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="705" y="602" width="235" height="56" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="822" y="626" text-anchor="middle" class="node-label">Graph JSON</text>
    <text x="822" y="646" text-anchor="middle" class="node-sub">insurevn_graph.json</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="602" width="285" height="56" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="1102" y="626" text-anchor="middle" class="node-label">Quality Report</text>
    <text x="1102" y="646" text-anchor="middle" class="node-detail">orphan, lineage, confidence checks</text>
  </g>

  <path d="M 507,445 L 507,602" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 507,602 L 507,530 L 802,530 L 802,445" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-green)"/>
  <path d="M 1097,445 L 1097,555" fill="none" stroke="#2563eb" stroke-width="2"/>
  <path d="M 1097,555 L 822,555 L 822,602" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 1097,555 L 1102,555 L 1102,602" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <g transform="translate(70, 715)">
    <line x1="0" y1="10" x2="36" y2="10" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="50" y="15" class="legend-text">Main data flow</text>
    <line x1="190" y1="10" x2="226" y2="10" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-green)"/>
    <text x="240" y="15" class="legend-text">Schema/AI dependency</text>
    <line x1="445" y1="10" x2="481" y2="10" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-gray)"/>
    <text x="495" y="15" class="legend-text">Optional lineage</text>
  </g>
</svg>
