  <ellipse cx="815" cy="395" rx="80.0" ry="22.857142857142858" fill="#e0f2fe" stroke="#008cc1" stroke-width="1.5"/>
  <rect x="735.0" y="395" width="160" height="75" fill="#e0f2fe" stroke="none"/>
