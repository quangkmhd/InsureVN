  <text x="980" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">graph import</text>
  <rect x="50" y="875" width="1300" height="45" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="72" y="904" text-anchor="start" font-size="12" fill="#374151">AI-readable takeaway: data quality gates happen before retrieval; ingestion creates three canonical stores, and KG construction turns extracted entities/relations into auditable graph evidence for multi-hop reasoning.</text>
