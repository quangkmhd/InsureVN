  <text x="1054" y="680" font-size="12" fill="#374151" text-anchor="start">NetworkX JSON</text>
  <text x="1054" y="697" font-size="12" fill="#374151" text-anchor="start">quality report</text>
  <text x="1054" y="714" font-size="12" fill="#374151" text-anchor="start">Neo4j / GraphRAG import</text>
