  <text x="815" y="449.0" text-anchor="middle" font-size="11" fill="#374151">graph relationships</text>
  <rect x="1035" y="380" width="245" height="105" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="1051" y="406" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Evidence contract</text>
  <text x="1051" y="432" font-size="12" fill="#374151" text-anchor="start">Normalize to Evidence objects</text>
  <text x="1051" y="449" font-size="12" fill="#374151" text-anchor="start">Keep citations and lineage</text>
  <text x="1051" y="466" font-size="12" fill="#374151" text-anchor="start">Flag conflicts for review</text>
  <path d="M 1250,265 L 1250,345 L 1110,345 L 1110,380" fill="none" stroke="#059669" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)"/>
