  <text x="50" y="565" text-anchor="start" class="section">Knowledge Graph sidecar</text>
  <rect x="50" y="590" width="1300" height="250" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>
  <rect x="75" y="628" width="190" height="135" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="91" y="654" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Schema</text>
  <text x="91" y="672" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Discovery</text>
  <text x="91" y="698" font-size="12" fill="#374151" text-anchor="start">01_discover_schema.py</text>
  <text x="91" y="715" font-size="12" fill="#374151" text-anchor="start">Company, Plan, Benefit</text>
  <text x="91" y="732" font-size="12" fill="#374151" text-anchor="start">Exclusion, Condition</text>
  <rect x="300" y="628" width="190" height="135" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="316" y="654" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Schema</text>
  <text x="316" y="672" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Canonicalization</text>
  <text x="316" y="698" font-size="12" fill="#374151" text-anchor="start">02_canonicalize_schema.py</text>
  <text x="316" y="715" font-size="12" fill="#374151" text-anchor="start">merge similar labels</text>
  <text x="316" y="732" font-size="12" fill="#374151" text-anchor="start">select valuable relations</text>
  <rect x="555" y="628" width="190" height="135" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="571" y="654" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Schema Contract</text>
  <text x="571" y="672" font-size="15" fill="#111827" text-anchor="start" font-weight="700">V1</text>
  <text x="571" y="698" font-size="12" fill="#374151" text-anchor="start">03_select_schema_v1.py</text>
  <text x="571" y="715" font-size="12" fill="#374151" text-anchor="start">allowed_nodes.csv</text>
  <text x="571" y="732" font-size="12" fill="#374151" text-anchor="start">allowed_relationships.csv</text>
  <rect x="800" y="628" width="190" height="135" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="816" y="654" font-size="15" fill="#111827" text-anchor="start" font-weight="700">Graph Build</text>
  <text x="816" y="672" font-size="15" fill="#111827" text-anchor="start" font-weight="700">&amp; QA</text>
  <text x="816" y="698" font-size="12" fill="#374151" text-anchor="start">04_build_knowledge_graph.py</text>
  <text x="816" y="715" font-size="12" fill="#374151" text-anchor="start">orphan node checks</text>
  <text x="816" y="732" font-size="12" fill="#374151" text-anchor="start">lineage validation</text>
