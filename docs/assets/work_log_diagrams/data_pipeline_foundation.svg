  <rect width="1400" height="950" fill="#ffffff"/>
  <text x="50" y="48" text-anchor="start" class="title">Nhóm 4 — Data Pipeline Foundation</text>
  <text x="50" y="72" text-anchor="start" class="subtitle">Từ dữ liệu thô đến evidence foundation: SQLite + Qdrant + Neo4j, kèm nhánh Knowledge Graph schema -&gt; import</text>
  <text x="50" y="108" text-anchor="start" class="section">6-phase data pipeline</text>
  <rect x="50" y="130" width="180" height="135" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="66" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">1. Acquisition</text>
  <text x="66" y="182" font-size="12" fill="#374151" text-anchor="start">PDF/web sources</text>
  <text x="66" y="199" font-size="12" fill="#374151" text-anchor="start">9+ insurers</text>
  <text x="66" y="216" font-size="12" fill="#374151" text-anchor="start">raw corpus</text>
  <rect x="272" y="130" width="180" height="135" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="288" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">2. Preprocess &amp; QA</text>
  <text x="288" y="182" font-size="12" fill="#374151" text-anchor="start">Classify PDFs</text>
  <text x="288" y="199" font-size="12" fill="#374151" text-anchor="start">filter non-health</text>
  <text x="288" y="216" font-size="12" fill="#374151" text-anchor="start">clean source set</text>
  <rect x="494" y="130" width="180" height="135" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="510" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">3. Conversion</text>
  <text x="510" y="182" font-size="12" fill="#374151" text-anchor="start">PDF -&gt; Markdown</text>
  <text x="510" y="199" font-size="12" fill="#374151" text-anchor="start">OCR/VLM where needed</text>
  <text x="510" y="216" font-size="12" fill="#374151" text-anchor="start">table-to-narrative</text>
  <rect x="716" y="130" width="180" height="135" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="732" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">4. Extraction</text>
  <text x="732" y="182" font-size="12" fill="#374151" text-anchor="start">JSON/table/image data</text>
  <text x="732" y="199" font-size="12" fill="#374151" text-anchor="start">Good/Trash filtering</text>
  <text x="732" y="216" font-size="12" fill="#374151" text-anchor="start">SQL key mapping</text>
  <rect x="938" y="130" width="180" height="135" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="954" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">5. Training &amp; Eval</text>
  <text x="954" y="182" font-size="12" fill="#374151" text-anchor="start">Gemma4/Oumi sets</text>
  <text x="954" y="199" font-size="12" fill="#374151" text-anchor="start">chunking/retrieval eval</text>
  <text x="954" y="216" font-size="12" fill="#374151" text-anchor="start">benchmark gates</text>
  <rect x="1160" y="130" width="180" height="135" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#soft-shadow)"/>
  <text x="1176" y="156" font-size="15" fill="#111827" text-anchor="start" font-weight="700">6. Ingestion</text>
  <text x="1176" y="182" font-size="12" fill="#374151" text-anchor="start">SQLite facts</text>
  <text x="1176" y="199" font-size="12" fill="#374151" text-anchor="start">Qdrant chunks</text>
  <text x="1176" y="216" font-size="12" fill="#374151" text-anchor="start">KG import path</text>
  <path d="M 230,198 L 272,198" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path d="M 452,198 L 494,198" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
