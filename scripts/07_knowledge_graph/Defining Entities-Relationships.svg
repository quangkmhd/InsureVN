<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="500" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1e293b">Knowledge Graph: Entity &amp; Relationship Lifecycle</text>
  <text x="500" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#64748b">Quy trình tìm kiếm các loại thực thể và mối quan hệ (Discovery &amp; Extraction)</text>
  <rect x="40" y="100" width="920" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-dasharray="5,5" />
  <text x="55" y="125" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">INPUT SOURCES</text>
  <g filter="url(#shadow)">
    <rect x="100" y="120" width="160" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1" />
    <text x="180" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1e293b">Markdown Docs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="120" width="160" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1" />
    <text x="380" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1e293b">Qdrant Lineage</text>
  </g>
  <rect x="40" y="220" width="460" height="420" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
  <rect x="40" y="220" width="460" height="40" rx="16 16 0 0" fill="#3b82f6" />
  <text x="270" y="247" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">PHASE 1: DEFINING ENTITIES &amp; RELATIONSHIPS</text>
  <text x="270" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#2563eb">Mục tiêu: Tìm các loại thực thể (Codes) và Quan hệ mẫu</text>
  <g filter="url(#shadow)">
    <rect x="140" y="300" width="260" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="270" y="325" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#1e3a8a">01_discover_schema</text>
    <text x="270" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Finding candidate Entities &amp; Relationships</text>
  </g>
  <path d="M 270,360 L 270,390" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)" />
  <g filter="url(#shadow)">
    <rect x="140" y="390" width="260" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="270" y="415" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#1e3a8a">02_canonicalize_schema</text>
    <text x="270" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Merging &amp; Standardizing discovered codes</text>
  </g>
  <path d="M 270,450 L 270,480" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)" />
  <g filter="url(#shadow)">
    <rect x="140" y="480" width="260" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="270" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#1e3a8a">03_select_schema_v1</text>
    <text x="270" y="525" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Finalizing allowed Entities &amp; Relationships</text>
  </g>
  <g transform="translate(500, 390)">
    <path d="M 0,0 L 60,0" stroke="#3b82f6" stroke-width="3" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead-blue)" />
    <rect x="65" y="-30" width="160" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
    <text x="145" y="-12" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#92400e">ALLOWED TYPES CONTRACT</text>
    <text x="145" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309">allowed_nodes.csv (Codes)</text>
    <text x="145" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309">allowed_edges.csv (Rel)</text>
  </g>
  <rect x="710" y="220" width="250" height="420" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <rect x="710" y="220" width="250" height="40" rx="16 16 0 0" fill="#7c3aed" />
  <text x="835" y="247" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">PHASE 2: DATA MAPPING</text>
  <text x="835" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#6d28d9">Mục tiêu: Trích xuất quan hệ thật</text>
  <g filter="url(#shadow)">
    <rect x="730" y="380" width="210" height="80" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" />
    <text x="835" y="415" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#4c1d95">04_build_graph</text>
    <text x="835" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6d28d9">Mapping Real-world Entities</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="730" y="560" width="210" height="50" rx="8" fill="#4c1d95" />
    <text x="835" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">insurevn_graph.json</text>
  </g>
  <path d="M 180,160 L 180,300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 380,160 L 380,300" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  <path d="M 705,420 L 730,420" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 835,160 L 835,380" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <rect x="800" y="280" width="70" height="24" rx="4" fill="#ffffff" opacity="0.9" />
  <text x="835" y="297" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Real Data</text>
  <path d="M 835,460 L 835,560" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple)" />
  <path d="M 460,140 L 835,140 L 835,220" stroke="#64748b" stroke-width="2" fill="none" />
</svg>